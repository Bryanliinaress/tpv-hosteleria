name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://sgyioiadkaswfohpeyjx.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNneWlvaWFka2Fzd2ZvaHBleWp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NzIxOTUsImV4cCI6MjA5NzM0ODE5NX0.W4ZQlmeaf42JnqP5aN-QR_qA9oTnyZUjihK7BfkK2Kc
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
      # ── APP REAL (backend multi-tenant v2, Casa Loli) en /app/ ──
      - run: npm run build -- --outDir dist/app
        env:
          VITE_BASE: /tpv-hosteleria/app/
          VITE_BACKEND: v2
          VITE_SUPABASE_URL: https://tesilntyomnovjcuieho.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlc2lsbnR5b21ub3ZqY3VpZWhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwOTQxMTUsImV4cCI6MjA5OTY3MDExNX0.0KvPZzY58VkT0EKTQWPCE1aVI1LnNBvz2m-vgMfwVkc
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
